name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NUXT_PUBLIC_ENV: development
      NUXT_PUBLIC_DEFAULT_LOCALE: it
      NITRO_PRESET: node-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        env:
          NUXT_PUBLIC_UMAMI_HOST: https://analytics.test.local
          NUXT_PUBLIC_UMAMI_WEBSITE_ID: test-website-id
          PLAYWRIGHT_PORT: 3100
          NUXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
        run: |
          NUXT_PUBLIC_SITE_URL=http://127.0.0.1:3100 pnpm build
          pnpm test:e2e
